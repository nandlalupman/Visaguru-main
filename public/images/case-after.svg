<svg width="300" height="220" viewBox="0 0 300 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" rx="16" fill="#EFF9F4"/>
  
  <!-- Document -->
  <rect x="60" y="30" width="180" height="160" rx="12" fill="white" stroke="#D6EFE5" stroke-width="1.5"/>
  
  <!-- Green header -->
  <rect x="60" y="30" width="180" height="40" rx="12" fill="#2D7A5F" opacity="0.1"/>
  <rect x="60" y="58" width="180" height="12" fill="#2D7A5F" opacity="0.1"/>
  
  <!-- Check mark -->
  <circle cx="90" cy="50" r="10" fill="#2D7A5F" opacity="0.15"/>
  <path d="M85 50l4 4 6-6" stroke="#2D7A5F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="108" y="46" width="100" height="5" rx="2.5" fill="#2D7A5F" opacity="0.3"/>
  
  <!-- Clean document lines -->
  <rect x="80" y="85" width="140" height="5" rx="2.5" fill="#D6EFE5"/>
  <rect x="80" y="100" width="120" height="5" rx="2.5" fill="#D6EFE5"/>
  <rect x="80" y="115" width="100" height="5" rx="2.5" fill="#D6EFE5"/>
  <rect x="80" y="130" width="130" height="5" rx="2.5" fill="#D6EFE5"/>
  
  <!-- Approved stamp -->
  <g transform="translate(170, 155) rotate(-5)">
    <rect x="-42" y="-14" width="84" height="28" rx="4" fill="none" stroke="#2D7A5F" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#2D7A5F" font-size="11" font-weight="700" font-family="system-ui" letter-spacing="0.1em">APPROVED</text>
  </g>
  
  <!-- Gold accent -->
  <circle cx="90" cy="170" r="6" fill="#C9973E" opacity="0.3"/>
  <rect x="102" y="168" width="60" height="4" rx="2" fill="#C9973E" opacity="0.3"/>
</svg>
